name: Unity WebGL Build + Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# GitHub Pages へのデプロイ権限
permissions:
  contents: write

jobs:
  build:
    name: Build Unity WebGL
    runs-on: ubuntu-latest

    steps:
      # ソースコードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true          # Git LFS を使っている場合

      # Library フォルダをキャッシュ
      # Assets / Packages に変更があればキャッシュを破棄して再インポート
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-

      # Unity ライセンスのアクティベーション + ビルド
      # https://game.ci/docs/github/activation
      - name: Build project (WebGL)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto
          targetPlatform: WebGL
          buildsPath: build
          allowDirtyBuild: true

      # unityroom 用 Artifact（GZip）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build-${{ github.sha }}
          path: build/WebGL/WebGL
          retention-days: 14
          if-no-files-found: error

      # GitHub Pages 用に .gz → .unityweb にリネームしてデプロイ
      # Decompression Fallback を有効化してブラウザ側で解凍させる
      - name: Prepare build for GitHub Pages
        run: |
          cp -r build/WebGL/WebGL pages_build
          # .gz → .unityweb にリネーム
          find pages_build -name "*.gz" | while read f; do
            mv "$f" "${f%.gz}.unityweb"
          done
          # loader.js 内の拡張子参照も書き換え
          find pages_build -name "*.js" | xargs sed -i 's/\.gz/\.unityweb/g'

      # GitHub Pages へデプロイ
      # https://github.com/peaceiris/actions-gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages_build
          # カスタムドメインを使う場合は以下を有効化
          # cname: your-custom-domain.com